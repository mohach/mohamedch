name: Auto Blog Post (DeepSeek)

on:
  schedule:
    - cron: '0 8 */2 * *'    # every 2 days at 8:00 UTC
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate bilingual post
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node generate-post.mjs

      - name: Commit and push
        id: push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          if git diff --cached --quiet; then
            echo "Nothing new, skipping."
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "post: auto $(date +%Y-%m-%d)"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Vercel rebuild
        if: steps.push.outputs.pushed == 'true'
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Vercel rebuild triggered."
